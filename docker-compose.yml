version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: publiart-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: publiart

  backend:
    build: ./backend
    container_name: publiart-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/publiart
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_too}
      PRODUCCION_PATH: /produccion
    volumes:
      - /D/PRODUCCION:/produccion:ro
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: publiart-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
